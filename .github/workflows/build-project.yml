name: Build Night Sky Engine
 
on:
  push:
    branches:
      - main
 
jobs:
  build:
    runs-on: self-hosted
    name: Build Night Sky Engine
    steps: 
      - name: Package Project
        env: 
          UE_PATH: 'C:\Program Files\Epic Games\UE_5.7' # Path to your Unreal Engine installation
          PROJECT_PATH: 'C:\Users\wistf\Unreal Projects\NightSkyEngine\NightSkyEngine.uproject' # Path to your Unreal project file
          OUTPUT_PATH: 'C:\Users\wistf\Unreal Projects\NightSkyEngine\Build\WindowsEditor' # Path to where you want to store the packaged game
        run: |
          # Try to run empty UAT to check for correct path
          & $env:UE_PATH\Engine\Build\BatchFiles\RunUAT.bat BuildEditor -project="$env:PROJECT_PATH" -notools

      - name: Upload artifact
        uses: actions/upload-artifact
        with:
          name: NSEPlugin
          path: |
            C:\Users\wistf\Unreal Projects\NightSkyEngine\Plugins\NightSkyEngine
            !C:\Users\wistf\Unreal Projects\NightSkyEngine\Plugins\NightSkyEngine\Intermediate
      
      - name: Upload artifact
        uses: actions/upload-artifact
        with:
          name: NightSkyEngine
          path: |
            C:\Users\wistf\Unreal Projects\NightSkyEngine\Binaries
            C:\Users\wistf\Unreal Projects\NightSkyEngine\Config
            C:\Users\wistf\Unreal Projects\NightSkyEngine\Content
            C:\Users\wistf\Unreal Projects\NightSkyEngine\Plugins
            C:\Users\wistf\Unreal Projects\NightSkyEngine\Source
            C:\Users\wistf\Unreal Projects\NightSkyEngine\NightSkyEngine.uproject
            !C:\Users\wistf\Unreal Projects\NightSkyEngine\Plugins\NightSkyEngine\Intermediate